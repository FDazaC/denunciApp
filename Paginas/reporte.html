<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Styles/main.css">
    <link rel="stylesheet" href="../Styles/botones.css">
    <link rel="stylesheet" href="../Styles/logos.css">
    <link rel="stylesheet" href="../Styles/reportes.css">
    <title>Nuevo Reporte - DenunciApp</title>
</head>
<body>
    <header class="header-principal">
        <img class="logoPagina" src="../assets/images/logoUniReport.png">
        <h1 style="color: rgb(40, 39, 39);">DenunciApp</h1>
        <a href="../index.html" class="boton-NuevoReporte">Volver al inicio</a>
        <button class="boton-Perfil">
            <img src="../assets/images/perfil.png" class="logoPerfil">Perfil
        </button>
    </header>

    <main>
    <h2>Nuevo Reporte</h2>

    <form>
        <label>Título</label><br>
        <input type="text" placeholder="Título del reporte" required><br><br>

        <label>Descripción</label><br>
        <input type="text" placeholder="Descripción del problema" required><br><br>

        <label>Publicado por</label><br>
        <input type="text" placeholder="Tu nombre" required><br><br>

        <label>Imagen</label><br>
        <input type="file" accept="image/*"><br><br>

        <button type="submit">Enviar Reporte</button>
        <a href="../index.html">Cancelar</a>
    </form>
</main>

    <footer style="background-color: blueviolet; margin-top: 20px;">
        xscdas
    </footer>
</body>
</html>
